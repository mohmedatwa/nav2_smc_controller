controller_server:
  ros__parameters:
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: true

    # =========================================================================
    #  DIFFERENTIAL DRIVE configuration
    #  Uncomment this block and comment out the omni block below to use it.
    # =========================================================================
    # FollowPath:
    #   plugin: "nav2_smc_controller/SMCController"
    #   robot_type: "diff"           # "diff" | "omni"
    #   base_frame_id: "base_link"   # Robot's local frame
    #
    #   # Sliding surface slope (s_w = e_y_dot + lambda * e_y)
    #   lambda: 1.0
    #
    #   # Switching gains
    #   k_linear:  0.5
    #   k_angular: 1.0
    #
    #   # Equivalent control gains
    #   eta_linear:  0.2
    #   eta_angular: 0.5
    #
    #   # Boundary layer phi
    #   boundary_layer: 0.1
    #
    #   max_linear_velocity:  0.3     # m/s
    #   max_angular_velocity: 1.0     # rad/s
    #   step_size: 0.2                # lookahead distance (m)

    # =========================================================================
    #  OMNIDIRECTIONAL configuration  (mecanum / holonomic)
    # =========================================================================
    FollowPath:
      plugin: "nav2_smc_controller/SMCController"
      robot_type: "omni"             # "diff" | "omni"
      base_frame_id: "base_link"     # Robot's local frame

      lambda: 1.0

      k_linear:  0.5
      eta_linear: 0.2

      k_lateral:  0.5
      eta_lateral: 0.2

      k_angular:  1.0
      eta_angular: 0.5

      boundary_layer: 0.1

      max_linear_velocity:  0.3     # m/s   (vx)
      max_lateral_velocity: 0.3     # m/s   (vy, omni only)
      max_angular_velocity: 1.0     # rad/s (wz)

      step_size: 0.2